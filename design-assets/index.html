<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>TOKY Email Signature Editor</title>
<meta name="viewport" content="width=1280" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   TOKY Email Signature Editor
   Dark (default) + Light theme tokens
   ============================================================ */

:root,
:root[data-theme="dark"] {
  --surface-base: #110B14;
  --surface-raised: #1C1420;
  --surface-overlay: #271D2E;
  --surface-active: #331F3D;
  --surface-input: #1C1420;

  --text-primary: #FEDBFF;
  --text-secondary: #A6ACAC;
  --text-muted: #5E5E5E;
  --text-accent: #E28CFF;

  --border-default: #271D2E;
  --border-subtle: #1C1420;
  --border-emphasis: #9E0085;
  --border-input: #5E5E5E;
  --border-input-focus: #E28CFF;

  --primary: #9E0085;
  --primary-hover: #B8009B;
  --primary-text: #FEDBFF;

  --success: #9FBF38;
  --warning: #FFAE00;
  --error: #F23E27;
  --info: #00B7FF;

  --shadow-pop: 0 8px 32px rgba(158, 0, 133, 0.15), 0 2px 8px rgba(0,0,0,0.3);
  --code-bg: #0B0710;
}

:root[data-theme="light"] {
  --surface-base: #FFFFFF;
  --surface-raised: #F7F7F8;
  --surface-overlay: #FFFFFF;
  --surface-active: #FEDBFF;
  --surface-input: #FFFFFF;

  --text-primary: #000000;
  --text-secondary: #5E5E5E;
  --text-muted: #A6ACAC;
  --text-accent: #9E0085;

  --border-default: #E7E6E8;
  --border-subtle: #F0F0F0;
  --border-emphasis: #9E0085;
  --border-input: #C9C7CB;
  --border-input-focus: #9E0085;

  --primary: #9E0085;
  --primary-hover: #7A0068;
  --primary-text: #FEDBFF;

  --success: #6B802F;
  --warning: #C17F00;
  --error: #D93520;
  --info: #004CEE;

  --shadow-pop: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.06);
  --code-bg: #FAFAFA;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--surface-base);
  color: var(--text-primary);
  font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }

:root {
  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}

/* ---------- App chrome ---------- */
.app { min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 24px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border-default);
  background: var(--surface-base);
  position: sticky; top: 0; z-index: 20;
}
.topbar .logo {
  font-weight: 800; letter-spacing: 0.08em;
  font-size: 18px;
  display: flex; align-items: center; gap: 10px;
  color: var(--text-primary);
}
.topbar .logo .mark {
  display: inline-flex; align-items: center; letter-spacing: 0.12em;
}
.topbar .logo .mark .o {
  display: inline-block; width: 0.7em; height: 0.7em;
  border: 2px solid currentColor; border-radius: 50%;
  margin: 0 0.08em; box-sizing: border-box;
}
.topbar .logo small {
  font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
  color: var(--text-secondary); text-transform: none;
  margin-left: 4px;
}
.topbar nav { display: flex; gap: 2px; margin-left: 12px; }
.topbar nav button {
  background: transparent; border: 0;
  color: var(--text-secondary);
  padding: 8px 14px;
  font-size: 13px; font-weight: 500;
  border-radius: 6px;
}
.topbar nav button:hover { color: var(--text-primary); background: var(--surface-raised); }
.topbar nav button.active {
  color: var(--text-accent);
  background: var(--surface-raised);
}
.topbar .spacer { flex: 1; }
.topbar .pill {
  font-size: 11px; color: var(--text-secondary);
  border: 1px solid var(--border-default);
  padding: 4px 10px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface-raised);
}
.topbar .pill.ok { color: var(--success); border-color: color-mix(in oklch, var(--success) 35%, transparent); background: color-mix(in oklch, var(--success) 10%, transparent); }

.theme-toggle {
  display: inline-flex; border: 1px solid var(--border-default);
  border-radius: 999px; padding: 2px; background: var(--surface-raised);
}
.theme-toggle button {
  background: transparent; border: 0;
  color: var(--text-secondary); padding: 5px 12px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  border-radius: 999px;
}
.theme-toggle button.on { background: var(--surface-overlay); color: var(--text-primary); box-shadow: inset 0 0 0 1px var(--border-default); }

.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface-overlay);
  color: var(--text-accent);
  font-size: 11px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border-default);
}

/* ---------- Panel primitives ---------- */
.panel {
  background: var(--surface-raised);
  border: 1px solid var(--border-default);
  border-radius: 8px;
}
.panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-default);
  display: flex; align-items: center; gap: 10px;
  font-size: 11.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-secondary);
}
.panel-header .spacer { flex: 1; }
.panel-header .muted { color: var(--text-muted); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 12px; }
.panel-body { padding: 16px; }

/* Tag / chip */
.tag {
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-secondary);
  background: var(--surface-raised);
  border: 1px solid var(--border-default);
  padding: 3px 8px; border-radius: 3px;
  display: inline-flex; align-items: center; gap: 5px;
}
.tag.accent { color: var(--text-accent); border-color: color-mix(in oklch, var(--text-accent) 30%, transparent); }
.tag.ok     { color: var(--success);     border-color: color-mix(in oklch, var(--success) 30%, transparent);     background: color-mix(in oklch, var(--success) 10%, transparent); }
.tag.warn   { color: var(--warning);     border-color: color-mix(in oklch, var(--warning) 30%, transparent);     background: color-mix(in oklch, var(--warning) 10%, transparent); }
.tag.err    { color: var(--error);       border-color: color-mix(in oklch, var(--error) 30%, transparent);       background: color-mix(in oklch, var(--error) 10%, transparent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500;
  padding: 7px 12px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.btn:hover { background: var(--surface-overlay); color: var(--text-primary); }
.btn.primary { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
.btn.primary:hover { background: var(--primary-hover); color: var(--primary-text); }
.btn.ghost { border-color: var(--border-default); color: var(--text-primary); }
.btn.ghost:hover { border-color: var(--border-input); background: var(--surface-overlay); }
.btn.sm { padding: 4px 9px; font-size: 12px; }
.btn.xs { padding: 2px 7px; font-size: 11px; }

/* Input */
.input {
  background: var(--surface-input);
  border: 1px solid var(--border-input);
  color: var(--text-primary);
  padding: 7px 10px;
  border-radius: 5px;
  font-family: inherit;
  font-size: 13px;
  width: 100%;
}
.input:focus { outline: none; border-color: var(--border-input-focus); box-shadow: 0 0 0 3px color-mix(in oklch, var(--border-input-focus) 25%, transparent); }
.input::placeholder { color: var(--text-muted); }
select.input { appearance: none; padding-right: 28px; background-image: linear-gradient(45deg, transparent 50%, var(--text-secondary) 50%), linear-gradient(-45deg, transparent 50%, var(--text-secondary) 50%); background-position: calc(100% - 14px) 52%, calc(100% - 9px) 52%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }

.fieldrow {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 12px;
  align-items: start;
  padding: 10px 0;
  border-bottom: 1px dashed var(--border-default);
}
.fieldrow:last-child { border-bottom: 0; }
.fieldrow label {
  color: var(--text-secondary); font-size: 12px; font-weight: 500;
  padding-top: 8px;
}
.fieldrow .sub {
  font-size: 10.5px; color: var(--text-muted);
  letter-spacing: 0.02em; margin-top: 2px;
}

/* Signature preview (actual rendered TOKY signature) */
.sig-preview {
  background: #fff; color: #666;
  border-radius: 6px;
  padding: 22px 24px;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 11px;
  line-height: 15px;
  width: 300px;
  max-width: 100%;
}
.sig-preview .sig-salutation { font-weight: 700; color: #666; text-decoration: underline; margin-bottom: 14px; }
.sig-preview .sig-logo {
  display: inline-flex; align-items: center;
  font-weight: 800; letter-spacing: 0.18em; font-size: 16px;
  color: #000; margin-bottom: 14px;
}
.sig-preview .sig-logo .o {
  display: inline-block; width: 0.65em; height: 0.65em;
  border: 2px solid #000; border-radius: 50%;
  margin: 0 0.06em; box-sizing: border-box;
}
.sig-preview .sig-logo .reg { font-size: 7px; vertical-align: super; margin-left: 1px; letter-spacing: 0; }
.sig-preview .sig-name { color: #be1900; font-weight: 700; }
.sig-preview .sig-role { color: #666; margin-bottom: 14px; }
.sig-preview .sig-company { color: #666; font-weight: 700; }
.sig-preview .sig-tagline { color: #666; font-style: italic; margin-bottom: 14px; }
.sig-preview .sig-row { color: #666; }
.sig-preview .sig-row .k { color: #be1900; font-weight: 700; }
.sig-preview .sig-row .sep { margin: 0 6px; }
.sig-preview .sig-cta { color: #be1900; font-weight: 700; margin-top: 14px; margin-bottom: 14px; }
.sig-preview .sig-socials { display: flex; gap: 4px; margin-top: 4px; }
.sig-preview .sig-socials span {
  width: 24px; height: 24px; background: #000; color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; border-radius: 2px;
}
.sig-preview .ph-pill {
  display: inline-block;
  background: rgba(158, 0, 133, 0.10);
  color: #9E0085;
  border: 1px dashed #9E0085;
  padding: 0 4px; border-radius: 3px;
  font-family: var(--font-mono); font-size: 10px;
}

/* Character counter */
.char-counter {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--surface-overlay);
  border: 1px solid var(--border-default);
}
.char-counter .bar { width: 72px; height: 4px; background: var(--surface-base); border-radius: 2px; overflow: hidden; position: relative; }
.char-counter .fill { position: absolute; inset: 0; background: var(--success); }
.char-counter.warn { color: var(--warning); }
.char-counter.warn .fill { background: var(--warning); }
.char-counter.err  { color: var(--error); }
.char-counter.err .fill { background: var(--error); }

/* Code editor */
.code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--code-bg);
  border: 1px solid var(--border-default);
  border-radius: 6px;
  padding: 14px 14px 14px 48px;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre;
  overflow: auto;
  counter-reset: line;
}
.code .ln { display: block; counter-increment: line; position: relative; }
.code .ln::before {
  content: counter(line);
  position: absolute; left: -36px;
  color: var(--text-muted); font-size: 11px;
  text-align: right; width: 24px;
}
.code .t { color: var(--text-accent); }
.code .a { color: var(--warning); }
.code .s { color: var(--success); }
.code .ph { color: var(--text-accent); background: color-mix(in oklch, var(--text-accent) 12%, transparent); padding: 0 2px; border-radius: 2px; }
.code .c { color: var(--text-muted); font-style: italic; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th {
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-secondary);
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-default);
  background: var(--surface-raised);
}
.tbl tbody td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-default);
  color: var(--text-primary);
  vertical-align: middle;
}
.tbl tbody tr { cursor: pointer; }
.tbl tbody tr:hover td { background: var(--surface-overlay); }
.tbl tbody tr.selected td { background: color-mix(in oklch, var(--primary) 18%, transparent); }
.tbl .chip {
  display: inline-block; font-size: 10.5px;
  padding: 2px 7px; border-radius: 3px;
  background: var(--surface-overlay); color: var(--text-secondary);
  border: 1px solid var(--border-default);
}
.tbl .chip.ok { color: var(--success); border-color: color-mix(in oklch, var(--success) 30%, transparent); background: color-mix(in oklch, var(--success) 10%, transparent); }
.tbl .chip.warn { color: var(--warning); border-color: color-mix(in oklch, var(--warning) 30%, transparent); background: color-mix(in oklch, var(--warning) 10%, transparent); }
.tbl .chip.err { color: var(--error); border-color: color-mix(in oklch, var(--error) 30%, transparent); background: color-mix(in oklch, var(--error) 10%, transparent); }

/* Kbd */
.kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  border: 1px solid var(--border-default);
  padding: 1px 5px; border-radius: 3px;
  color: var(--text-secondary);
  background: var(--surface-base);
}

/* Helpers */
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.flex-1 { flex: 1; min-width: 0; }
.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.muted { color: var(--text-secondary); }
.mono { font-family: var(--font-mono); }
.small { font-size: 12px; }
.xs { font-size: 11px; }
.upper { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

/* Tweaks panel */
.tweaks-panel {
  position: fixed; right: 16px; bottom: 16px; width: 280px;
  background: var(--surface-overlay);
  border: 1px solid var(--border-emphasis);
  border-radius: 8px; padding: 14px; z-index: 100;
  display: none;
  box-shadow: var(--shadow-pop);
}
.tweaks-panel.active { display: block; }
.tweaks-panel h4 { margin: 0 0 12px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-accent); }
.tweaks-panel label { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.tweaks-panel select { background: var(--surface-input); border: 1px solid var(--border-input); color: var(--text-primary); padding: 4px 6px; border-radius: 5px; font-size: 12px; }

</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<div id="root"></div>

<script type="text/babel" data-presets="react">
/* global React */

// Shared data + reusable preview components

const sampleTeam = [

  { id: 180559, name: 'Alec Gleeson',    role: 'Creative Director',      email: 'alec@toky.com',    mobile: '314.555.0144', initials: 'AG', status: 'synced', template: 'standard', updated: '2d' },
  { id: 180560, name: 'Alex Ray',        role: 'Art Director',           email: 'alex@toky.com',    mobile: '314.555.0188', initials: 'AR', status: 'synced', template: 'standard', updated: '5d' },

};

function SignaturePreview({ fields = defaultFields, showPlaceholders = false }) {
  const f = fields;
  const P = ({ k, v }) => showPlaceholders
    ? <span className="ph-pill">{`{{ user.${k} }}`}</span>
    : <>{v || <span className="ph-pill">empty</span>}</>;

  return (
    <div className="sig-preview">
      <div className="sig-salutation"><P k="salutation" v={f.salutation} /></div>

function CharCounter({ chars = 6230, limit = 10000, label = 'Gmail limit' }) {
  const pct = chars / limit;
  const cls = pct > 0.95 ? 'err' : pct > 0.8 ? 'warn' : '';
  return (
    <div className={`char-counter ${cls}`}>
      <div className="bar"><div className="fill" style={{width: `${Math.min(pct*100, 100)}%`}} /></div>
      <span>{chars.toLocaleString()} / {limit.toLocaleString()}</span>
      <span style={{color:'var(--text-muted)'}}>{label}</span>
    </div>
  );
}

Object.assign(window, { sampleTeam, defaultFields, SignaturePreview, CharCounter });

<script type="text/babel" data-presets="react">
/* global React, SignaturePreview, CharCounter, sampleTeam */

// Team page — roster-first, view-only per-person.
// No inline editing of individual fields. Row click opens a read-only detail
// panel showing their rendered signature + status, with actions: download,
// resend, resync-from-Airtable, open template, etc.
function TeamPage() {

<script type="text/babel" data-presets="react">
/* global React, ReactDOM, TeamPage, TemplatesPage */

const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "page": "team",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [theme, setTheme] = React.useState(() => localStorage.getItem('toky_theme') || TWEAKS.theme);
  const [page, setPage]   = React.useState(() => localStorage.getItem('toky_page')  || TWEAKS.page);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('toky_theme', theme);
  }, [theme]);
  React.useEffect(() => { localStorage.setItem('toky_page', page); }, [page]);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    if (k === 'theme') setTheme(v);
    if (k === 'page') setPage(v);
  };

  return (
    <div className="app">
      <header className="topbar">
        <div className="logo">
          <span className="mark">T<span className="o" />K Y</span>
          <small>Email Signature Editor</small>
        </div>
        <nav data-screen-label={page === 'team' ? '01 Team' : '02 Templates'}>
          <button className={page==='team'?'active':''} onClick={()=>setPage('team')}>Team</button>
          <button className={page==='templates'?'active':''} onClick={()=>setPage('templates')}>Templates</button>
        </nav>
        <div className="spacer" />
        <span className="pill ok">● Airtable · synced 2m</span>
        <div className="theme-toggle" role="tablist" aria-label="Theme">
          <button className={theme==='light'?'on':''} onClick={()=>setTheme('light')}>Light</button>
          <button className={theme==='dark'?'on':''}  onClick={()=>setTheme('dark')}>Dark</button>
        </div>
        <span className="avatar" title="jerry@toky.com">JG</span>
      </header>

      <main>
        {page === 'team' && <TeamPage />}
        {page === 'templates' && <TemplatesPage />}
      </main>

      <div className={`tweaks-panel ${tweaksOpen?'active':''}`}>
        <h4>Tweaks</h4>
        <label>Theme
          <select value={theme} onChange={e=>setTweak('theme', e.target.value)}>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label>Page
          <select value={page} onChange={e=>setTweak('page', e.target.value)}>
            <option value="team">Team</option>
            <option value="templates">Templates</option>
          </select>
        </label>
        <div className="xs muted mt-3" style={{lineHeight:1.5}}>
          Use the top nav to switch between <b>Team</b> (roster) and <b>Templates</b> (three-pane IDE).
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
